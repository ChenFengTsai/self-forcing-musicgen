# @package __global__

datasource:
  max_sample_rate: 32000
  max_channels: 1
  train: /storage/ssd1/richtsai1103/Jamendo/egs/jamendo/train
  valid: /storage/ssd1/richtsai1103/Jamendo/egs/jamendo/valid
  evaluate: /storage/ssd1/richtsai1103/Jamendo/egs/jamendo/generate
  generate: /storage/ssd1/richtsai1103/Jamendo/egs/jamendo/generate

dataset:
  segment_duration: 30
  train:
    num_samples: 9000
    segment_duration: 30
    permutation_on_files: true
  valid:
    num_samples: 500
    segment_duration: 30
  evaluate:
    num_samples: 500
    segment_duration: 30
  generate:
    num_samples: 50
    segment_duration: 30

evaluate:
  every: 10
  num_workers: 5
  metrics:
    base: true
    fad: true
    kld: true
    text_consistency: true
    chroma_cosine: true
  prefix_rollout_ce: true
  prefix_ratio: 0.3
  temporal_analysis: true
  window_sizes_sec: [10, 20, 30]
  windowed_audio_metrics: true

generate:
  every: 10
  lm:
    gen_duration: 30
    prompt_duration: 15
    gen_gt_samples: true

metrics:
  kld:
    passt:
      pretrained_length: 30
  fad:
    model: tf
    tf:
      model_path: //reference/fad/vggish_model.ckpt
  text_consistency:
    model: clap
    clap:
      model_path: //reference/clap/music_audioset_epoch_15_esc_90.14.pt

sass:
  enabled: true
  p_max: 0.25         # global ceiling
  warmup_start: 5000   # start SASS after this many steps
  warmup_ramp: 8000    # ramp to full strength over this many steps
  alpha: 2.0           # temporal exponent (2 = quadratic)
  beta: 0.25           # min replacement for codebook 0
  gamma: 2.0           # depth exponent
  c_min: 0.35          # confidence floor
  c_max: 0.85          # confidence ceiling
  token_cap: 0.25      # hard per-position cap