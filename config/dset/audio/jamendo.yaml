sass:
  enabled: true
  p_max: 0.20           # slightly higher ceiling (was 0.15)
  warmup_start: 5000
  warmup_ramp: 8000
  decay_ratio: 0.7      # NEW: after peak, decay p_max to 30% of its value
  alpha: 1.5            # linear temporal curve (was 2.0 parabolic)
  c_min: 0.35
  c_max: 0.85
  token_cap: 0.20       # match p_max
  temp: 1.0
  top_k: 250
  codebook_weights:      # NEW: weight each codebook's confidence in frame-level gating
    - 0.5                # q1 — coarse, usually confident; lower weight in decision
    - 0.5                # q2
    - 1.0                # q3 — harder; must be confident for safe frame replacement
    - 1.0                # q4 — hardest; must be confident for safe frame replacement