sass:
  enabled: false
  p_max: 0.75         # global ceiling (increased from 0.25)
  warmup_start: 3000  # start SASS after this many steps
  warmup_ramp: 6000   # ramp to full strength over this many steps
  alpha: 1.0          # temporal exponent (1.0 = linear)
  beta: 0.50          # min replacement for codebook 0 (increased from 0.25)
  gamma: 2.0          # depth exponent
  c_min: 0.15         # confidence floor (lowered from 0.35)
  c_max: 0.85         # confidence ceiling
  token_cap: 0.75     # hard per-position cap (increased to match p_max)